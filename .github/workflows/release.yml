name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify-tag-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag is reachable from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME is not on main branch. Aborting release."
            exit 1
          fi

  build-windows:
    name: Build Windows
    needs: verify-tag-on-main
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          $TAG = "${{ github.ref_name }}"
          go build -trimpath -ldflags "-s -w -X main.version=$TAG" -o bin/windows/dnode.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: dnode-windows
          path: bin/windows/dnode.exe

  build-linux:
    name: Build Linux
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          TAG="${{ github.ref_name }}"
          go build -trimpath -ldflags "-s -w -X main.version=${TAG}" -o bin/linux/dnode .

      - uses: actions/upload-artifact@v4
        with:
          name: dnode-linux
          path: bin/linux/dnode

  release:
    name: Publish release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dnode-windows
          path: dist/windows

      - uses: actions/download-artifact@v4
        with:
          name: dnode-linux
          path: dist/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/windows/dnode.exe
            dist/linux/dnode
