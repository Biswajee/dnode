run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - unused
    - misspell

linters-settings:
  errcheck:
    exclude-functions:
      - syscall.Close
      - syscall.Bind
      - (golang.org/x/sys/windows.Handle).Close

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
